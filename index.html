<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Whether</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
          <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js" rel="stylesheet"> 
        <link href="style.css" rel="stylesheet">
     
    </head>
    <body>
        <header>
            <nav class="navbar navbar-expand-lg navbar-light fixed-top">
                <div class="container">
                    <h1>Weather Forecast</h1>
                </div>
            </nav>
        </header>

<!--content-->
        <section class=" content">
            <div class="container">
                <div class="row">
                    <div class="col-4 pt-5 mt-5">
                        <div class="card" style="width: 20rem; height: 30rem" id="c1">
                            <div class="card-body">
                                <button  id="locbtn"><i class="bi bi-search"></i></button>
                                <input type="text" placeholder="Enter city name"  onkeyup="getWeather()" id="city"/>
                            
                                <div class="deg">
                                    <div id="weather-result" class="text-center"></div>  
                                </div>                              
                              
                            </div>
                        </div>
                    </div>

                    <!--Details-->
                    <div class="col-8 pt-5 mt-5">
                        <div class="card" style="width: 40rem; height: 30rem" id="c2">
                            <div class="card-body">
                                <div class="container text-start"><div class="subcards">
                                    <div class="row">
                                        <h6 style="font-size: large; padding: 20px; color: #5170ff;">Today Highlight And 5 Day Forecast</h6>
                                        <div class="col-sm-4">
                                            <div class="card">
                                                <div class="card-body">
                                                    <h6>Humidity<i class="bi bi-droplet"></i></h6>
                                                </div>
                                                        <p id="humidity"></p>
                                                        
                                            </div>
                                        </div>
                                        <div class="col-sm-4">
                                            <div class="card">
                                                <div class="card-body">
                                                    <h6>Wind_speed <i class="bi bi-wind"></i></h6>
                                                </div>
                                                    <p id="wind"></p>                                  
                                            </div>
                                        </div>
                                        <div class="col-sm-4">
                                            <div class="card">
                                                <div class="card-body">
                                                    <h6>Pressure  <i class="bi bi-thermometer"></i></h6>
                                                </div>
                                                     <p id="pressure"></p>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="row">
                                        <div class="col-sm-4">
                                            <div class="card">
                                                <div class="card-body">
                                                    <h6>Clouds   <i class="bi bi-cloud"></i></h6>
                                                    <p id="cloud"></p>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="col-sm-4">
                                            <div class="card">
                                                <div class="card-body">
                                                    <h6>Sunrise    <i class="bi bi-sunrise"></i></h6>
                                                    <p id="rise"></p>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="col-sm-4">
                                            <div class="card">
                                                <div class="card-body">
                                                    <h6>Sunset    <i class="bi bi-moon"></i></h6>
                                                    <p id="set"></p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    
                                        <div class="row ">
                                            <div id="forecast"></div>
                                        </div>
                                                
                                </div>
                                </div></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>   
        
        
        <!--javascript-->
        <script src="script.js"></script>
    </body>
</html>
